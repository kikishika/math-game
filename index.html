<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>도전! 연산왕</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- 메인 화면: 연산 선택 -->
        <div id="screen-main" class="screen active">
            <!-- 멈추지 않는 무한 배너 -->
            <div class="banner-container">
                <div class="marquee-wrapper">
                    <div class="banner-content">
                        <img src="char_add.png" class="mascot" alt="더하기">
                        <img src="char_sub.png" class="mascot" alt="빼기">
                        <img src="char_mul.png" class="mascot" alt="곱하기">
                        <img src="char_div.png" class="mascot char-div-style" alt="나누기">
                    </div>
                    <div class="banner-content">
                        <img src="char_add.png" class="mascot" alt="더하기">
                        <img src="char_sub.png" class="mascot" alt="빼기">
                        <img src="char_mul.png" class="mascot" alt="곱하기">
                        <img src="char_div.png" class="mascot char-div-style" alt="나누기">
                    </div>
                </div>
            </div>
            <h1>도전! 연산왕</h1>
            <p>신나게 연산 놀이를 시작해볼까요?</p>
            <div class="menu-grid">
                <button class="menu-btn btn-add" onclick="selectOperation('+')">
                    <img src="char_add.png" class="btn-char" alt="더하기">
                    <span>더하기 (+)</span>
                </button>
                <button class="menu-btn btn-sub" onclick="selectOperation('-')">
                    <img src="char_sub.png" class="btn-char" alt="빼기">
                    <span>빼기 (-)</span>
                </button>
                <button class="menu-btn btn-mul" onclick="selectOperation('*')">
                    <img src="char_mul.png" class="btn-char" alt="곱하기">
                    <span>곱하기 (×)</span>
                </button>
                <button class="menu-btn btn-div" onclick="selectOperation('/')">
                    <img src="char_div.png" class="btn-char char-div-style" alt="나누기">
                    <span>나누기 (÷)</span>
                </button>
            </div>
            <button class="menu-btn btn-history"
                style="background-color: #607D8B; font-size: 1.2rem; padding: 15px; margin-bottom: 10px;"
                onclick="showHistory()">📝 기록 및 선물 보관함</button>
            <p style="margin-top: 10px; font-size: 1rem; color: #888;">언제나 응원할게! 넌 할 수 있어! ✨</p>
        </div>

        <!-- 난이도 선택 화면 -->
        <div id="screen-difficulty" class="screen hidden">
            <h1>난이도 선택</h1>
            <p id="selected-op-text"></p>
            <div class="menu-grid">
                <button class="menu-btn btn-level1" onclick="selectDifficulty(1)">1자리 수 (초급)</button>
                <button class="menu-btn btn-level2" onclick="selectDifficulty(2)">2자리 수 (중급)</button>
            </div>
            <button class="back-btn" onclick="showScreen('screen-main')">뒤로가기</button>
        </div>

        <!-- 게임 화면 -->
        <div id="screen-game" class="screen hidden">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button onclick="goToHome()"
                    style="padding: 5px 15px; border-radius: 10px; border: none; background-color: #ccc; font-family: 'Jua', sans-serif; cursor: pointer;">🏠
                    홈으로</button>
            </div>
            <div class="game-header">
                <div class="progress">문제: <span id="current-q">1</span> / 5</div>
                <div class="timer">시간: <span id="time-elapsed">0</span>초</div>
            </div>
            <div class="question-container">
                <div id="question-text">5 + 3 = ?</div>
                <div id="answer-input"></div>
            </div>

            <!-- 커스텀 숫자 패드 -->
            <div class="numpad">
                <button onclick="inputNumber(1)">1</button>
                <button onclick="inputNumber(2)">2</button>
                <button onclick="inputNumber(3)">3</button>
                <button onclick="inputNumber(4)">4</button>
                <button onclick="inputNumber(5)">5</button>
                <button onclick="inputNumber(6)">6</button>
                <button onclick="inputNumber(7)">7</button>
                <button onclick="inputNumber(8)">8</button>
                <button onclick="inputNumber(9)">9</button>
                <button class="btn-clear" onclick="clearInput()">지우기</button>
                <button onclick="inputNumber(0)">0</button>
                <button class="btn-submit" onclick="submitAnswer()">입력</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="screen-result" class="screen hidden">
            <h1 id="result-title">게임 종료!</h1>
            <div class="result-details">
                <p>점수: <span id="final-score" class="highlight"></span>점</p>
                <p>맞힌 문제: <span id="correct-count"></span> / 5</p>
                <p>걸린 시간: <span id="final-time"></span>초</p>
            </div>

            <div id="reward-container" class="reward-box hidden">
                <img src="mascot_v2.png" class="reward-mascot" alt="연산왕">
                <h2>👑 연산왕의 특별 선물! 👑</h2>
                <p>백점 만점! 보너스 사용 시간이 도착했어요!</p>
                <div id="reward-time" class="reward-highlight"></div>
                <p style="font-size: 0.9rem; color: #795548; margin-top: 5px;">선물 보관함을 확인해보세요!</p>
            </div>

            <button class="menu-btn btn-restart" onclick="resetGame()">처음으로 돌아가기</button>
        </div>

        <!-- 기록 및 보상 화면 -->
        <div id="screen-history" class="screen hidden" style="overflow-y: auto;">
            <h1>선물 보관함</h1>

            <div class="reward-list-container">
                <h3>보유 중인 선물 (총 <span id="total-reward-time">0</span>분)</h3>
                <ul id="reward-ul" class="history-ul"></ul>
            </div>

            <h1 style="margin-top:20px; font-size: 2rem;">최근 게임 기록</h1>
            <div class="history-list-container">
                <ul id="history-ul" class="history-ul"></ul>
            </div>

            <div class="history-footer">
                <button onclick="resetHistory()" class="danger-btn">기록 모두 지우기</button>
                <button onclick="goToHome()" class="secondary-btn">홈으로 가기</button>
            </div>
        </div>

    </div>
    <script src="app.js?v=7"></script>
</body>

</html>
