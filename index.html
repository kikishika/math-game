<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도전! 연산왕</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 메인 화면: 연산 선택 -->
        <div id="screen-main" class="screen active">
            <h1>도전! 연산왕</h1>
            <p>어떤 게임을 해볼까요?</p>
            <div class="menu-grid">
                <button class="menu-btn btn-add" onclick="selectOperation('+')">더하기 (+)</button>
                <button class="menu-btn btn-sub" onclick="selectOperation('-')">빼기 (-)</button>
                <button class="menu-btn btn-mul" onclick="selectOperation('*')">곱하기 (×)</button>
                <button class="menu-btn btn-div" onclick="selectOperation('/')">나누기 (÷)</button>
            </div>
        </div>

        <!-- 난이도 선택 화면 -->
        <div id="screen-difficulty" class="screen hidden">
            <h1>난이도 선택</h1>
            <p id="selected-op-text"></p>
            <div class="menu-grid">
                <button class="menu-btn btn-level1" onclick="selectDifficulty(1)">1자리 수<br>(초급)</button>
                <button class="menu-btn btn-level2" onclick="selectDifficulty(2)">2자리 수<br>(중급)</button>
            </div>
            <button class="back-btn" onclick="showScreen('screen-main')">뒤로가기</button>
        </div>

        <!-- 게임 화면 -->
        <div id="screen-game" class="screen hidden">
            <div class="game-header">
                <div class="progress">문제: <span id="current-q">1</span> / 5</div>
                <div class="timer">시간: <span id="time-elapsed">0</span>초</div>
            </div>
            <div class="question-container">
                <div id="question-text">5 + 3 = ?</div>
                <div id="answer-input"></div>
            </div>
            
            <!-- 커스텀 숫자 패드 -->
            <div class="numpad">
                <button onclick="inputNumber(1)">1</button>
                <button onclick="inputNumber(2)">2</button>
                <button onclick="inputNumber(3)">3</button>
                <button onclick="inputNumber(4)">4</button>
                <button onclick="inputNumber(5)">5</button>
                <button onclick="inputNumber(6)">6</button>
                <button onclick="inputNumber(7)">7</button>
                <button onclick="inputNumber(8)">8</button>
                <button onclick="inputNumber(9)">9</button>
                <button class="btn-clear" onclick="clearInput()">지우기</button>
                <button onclick="inputNumber(0)">0</button>
                <button class="btn-submit" onclick="submitAnswer()">입력</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="screen-result" class="screen hidden">
            <h1 id="result-title">게임 종료!</h1>
            <div class="result-details">
                <p>점수: <span id="final-score" class="highlight"></span>점</p>
                <p>맞힌 문제: <span id="correct-count"></span> / 5</p>
                <p>걸린 시간: <span id="final-time"></span>초</p>
            </div>
            
            <div id="reward-container" class="reward-box hidden">
                <h2>🎉 백점 만점 축하해요! 🎉</h2>
                <p>보너스 사용 시간 선물 도착!</p>
                <div id="reward-time" class="reward-highlight"></div>
            </div>

            <button class="menu-btn btn-restart" onclick="resetGame()">처음으로 돌아가기</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
